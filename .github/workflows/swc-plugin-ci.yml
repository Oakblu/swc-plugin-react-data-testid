name: 🦀 SWC Plugin CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master]
    tags: ['swc-v*']

concurrency:
  group: swc-plugin-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-ready:
    name: 🚦 Check PR Status
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: 🚦 Check if PR is ready
        id: check
        run: |
          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "🚧 PR is in draft mode, skipping validation"
          else
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "✅ PR is ready for validation"
          fi

  test:
    name: 🧪 Cargo Test
    runs-on: ubuntu-latest
    needs: [check-ready]
    if: |
      always() && (
        github.event_name == 'push' ||
        needs.check-ready.outputs.ready == 'true'
      )

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: 🧪 Run Tests
        run: cargo test

  build-wasm:
    name: 🔨 Build WASM
    runs-on: ubuntu-latest
    needs: [test]
    # Only build on push to master or on tag push — not on every PR
    if: github.event_name == 'push'

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust (stable + wasm32-wasip1)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: 📦 Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: 🔨 Build WASM
        run: cargo build --target wasm32-wasip1 --release

      - name: 📤 Upload WASM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swc-plugin-wasm-${{ github.sha }}
          path: target/wasm32-wasip1/release/swc_plugin_react_data_testid.wasm
          retention-days: 7

  summary:
    name: 📋 CI Summary
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: 📋 Generate Summary
        run: |
          echo "## 🦀 SWC Plugin CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cargo Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.test.result }}" == "success" ]]; then
            echo "### ✅ All Checks Passed!" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ All fixture tests passing" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **Note**: WASM build runs on merge to master, not on PR." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Tests Failed" >> $GITHUB_STEP_SUMMARY
            echo "Run \`cargo test\` locally to debug." >> $GITHUB_STEP_SUMMARY
            echo "To regenerate fixture outputs: \`UPDATE=1 cargo test\`" >> $GITHUB_STEP_SUMMARY
          fi
